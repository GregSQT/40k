name: unit-tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.runtime.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run Python unit tests
        run: pytest tests/unit -q

      - name: Run critical Python coverage gate
        run: |
          pytest tests/unit -q \
            --cov=engine \
            --cov=shared \
            --cov=services \
            --cov=ai/reward_mapper.py \
            --cov=ai/scenario_manager.py \
            --cov=ai/replay_converter.py \
            --cov=ai/metrics_tracker.py \
            --cov=ai/game_replay_logger.py \
            --cov=ai/step_logger.py \
            --cov-report=term-missing \
            --cov-fail-under=60

      - name: Report global AI coverage (informative)
        run: |
          pytest tests/unit/ai -q \
            --cov=ai \
            --cov-report=term-missing

      - name: Run package safety gates
        run: |
          pytest tests/unit/engine -q --cov=engine --cov-fail-under=70
          pytest tests/unit/shared -q --cov=shared --cov-fail-under=80

      - name: Unit solidity scorecard (binary)
        run: |
          python scripts/unit_solidite_scorecard.py --output reports/unit_solidite_scorecard.json

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run frontend critical coverage gate
        run: npm --prefix frontend run test:critical

      - name: Report frontend global coverage (informative)
        run: npm --prefix frontend run test:coverage:global
