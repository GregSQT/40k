[pytest]
# Imports projet (``shared``, ``services``, ``engine``, …) depuis la racine du dépôt.
pythonpath = .
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -q --strict-markers
markers =
    unit: fast deterministic unit tests
    integration: cross-module tests
    anomaly: sentinel test tracking a documented known anomaly
